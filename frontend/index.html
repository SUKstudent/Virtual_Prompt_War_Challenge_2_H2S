/* Welcome Header */
.welcome-header {
    text-align: center;
    padding: 30px 20px 20px 20px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.welcome-header h1 {
    font-size: 2rem;
    margin-bottom: 8px;
}

.welcome-header .tagline {
    font-size: 1rem;
    opacity: 0.9;
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicAssist</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg">

<div class="card">

    <!-- HEADER -->
    <div class="header">
        <div class="title">🗳️ CivicAssist</div>
        <div class="subtitle">Your Smart Guide to Elections & Voting</div>
    </div>

    <!-- CHAT -->
    <div id="chatArea" class="chat">

        <div class="bot">
            👋 Hello! I'm CivicAssist.<br><br>
            I help you understand elections, voting process, eligibility, registration and governments worldwide.
        </div>

    </div>

    <!-- QUICK ACTIONS -->
    <div class="chips">
        <button onclick="ask('What are elections?')">What are elections?</button>
        <button onclick="ask('Voting process')">Voting process</button>
        <button onclick="ask('How to register?')">How to register?</button>
        <button onclick="ask('Eligibility')">Eligibility check</button>
        <button onclick="ask('Election timeline')">Timeline</button>
        <button onclick="ask('Blockchain voting')">Blockchain voting</button>
    </div>

    <!-- INPUT -->
    <div class="inputBox">
        <input id="input" placeholder="Ask anything about elections...">
        <button onclick="send()">Send</button>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        📊 Help us improve • CivicAssist
    </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
